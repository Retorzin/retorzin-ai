  :root {
    --c1: #00f5ff;
    --c2: #7b2fff;
    --c3: #ff2d78;
    --bg: #05050f;
    --panel: rgba(0,10,30,0.90);
    --txt: #e0eeff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    color: var(--txt);
    overflow: hidden;
  }
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
  }
  @keyframes gridMove { to { background-position: 40px 40px; } }
  .bg-orb {
    position: fixed; border-radius: 50%; filter: blur(80px); z-index: 0; pointer-events: none;
  }
  .orb1 { width:400px;height:400px;background:rgba(123,47,255,0.15);top:-100px;right:-100px;animation:orbFloat 8s ease-in-out infinite; }
  .orb2 { width:300px;height:300px;background:rgba(0,245,255,0.10);bottom:-80px;left:-80px;animation:orbFloat 10s ease-in-out infinite reverse; }
  @keyframes orbFloat { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,20px)} }

  #app {
    position:relative;z-index:1;
    width:96%;max-width:480px;height:92vh;max-height:780px;
    display:flex;flex-direction:column;
    background:var(--panel);
    border:1px solid rgba(0,245,255,0.15);
    border-radius:24px;
    backdrop-filter:blur(20px);
    box-shadow:0 0 60px rgba(0,245,255,0.07),0 30px 80px rgba(0,0,0,0.6);
    overflow:hidden;
  }
  #app::before {
    content:'';position:absolute;inset:0;z-index:2;
    background:linear-gradient(transparent 50%,rgba(0,245,255,0.012) 50%);
    background-size:100% 4px;pointer-events:none;border-radius:24px;
  }

  /* HEADER */
  #header {
    padding:14px 18px 12px;
    background:rgba(0,0,0,0.45);
    border-bottom:1px solid rgba(0,245,255,0.1);
    display:flex;align-items:center;gap:14px;
    flex-shrink:0;position:relative;
  }

  /* AVATAR RETORZIN */
  #avatar-wrap {
    position:relative;width:60px;height:60px;flex-shrink:0;cursor:pointer;
  }
  .avatar-ring {
    position:absolute;inset:-4px;border-radius:50%;
    border:2px solid transparent;
    background:linear-gradient(var(--bg),var(--bg)) padding-box,
               linear-gradient(135deg,var(--c1),var(--c2),var(--c3)) border-box;
    animation:ringRotate 4s linear infinite;
  }
  .avatar-ring2 {
    position:absolute;inset:-9px;border-radius:50%;
    border:1px solid rgba(0,245,255,0.2);
    animation:ringRotate 8s linear infinite reverse;
  }
  @keyframes ringRotate { to { transform:rotate(360deg); } }
  #avatar {
    width:60px;height:60px;border-radius:50%;
    overflow:hidden;position:relative;
    border:2px solid rgba(0,245,255,0.4);
    box-shadow:0 0 15px rgba(0,245,255,0.3);
  }
  #avatar img {
    width:100%;height:100%;object-fit:cover;
    object-position:center top;
    filter:saturate(1.2) contrast(1.05);
  }
  #avatar.talking {
    animation:avatarPulse 0.35s ease infinite alternate;
  }
  @keyframes avatarPulse {
    from{box-shadow:0 0 10px rgba(0,245,255,0.4);}
    to{box-shadow:0 0 30px rgba(0,245,255,1),0 0 60px rgba(123,47,255,0.5);}
  }
  .particle {
    position:absolute;width:4px;height:4px;border-radius:50%;
    background:var(--c1);pointer-events:none;
    animation:particleFly 0.8s ease-out forwards;
  }
  @keyframes particleFly {
    0%{opacity:1;transform:translate(0,0) scale(1);}
    100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0);}
  }

  .header-info { flex:1; }
  .header-name {
    font-family:'Orbitron',monospace;font-size:13px;font-weight:700;
    color:var(--c1);letter-spacing:2px;
    text-shadow:0 0 20px rgba(0,245,255,0.4);
  }
  .header-status {
    font-size:10px;color:rgba(255,255,255,0.5);letter-spacing:1px;margin-top:2px;
  }
  .status-dot {
    display:inline-block;width:6px;height:6px;border-radius:50%;
    background:#00ff88;box-shadow:0 0 6px #00ff88;
    animation:statusPulse 2s ease infinite;margin-right:5px;
  }
  @keyframes statusPulse{0%,100%{opacity:1}50%{opacity:0.4}}

  #soundwaves { display:flex;align-items:center;gap:3px;height:20px; }
  .wave-bar {
    width:3px;border-radius:2px;
    background:linear-gradient(to top,var(--c2),var(--c1));
    height:4px;transition:height 0.1s;
  }
  .wave-bar.active { animation:waveAnim 0.5s ease infinite; }
  .wave-bar:nth-child(1){animation-delay:0s}
  .wave-bar:nth-child(2){animation-delay:0.1s}
  .wave-bar:nth-child(3){animation-delay:0.05s}
  .wave-bar:nth-child(4){animation-delay:0.15s}
  .wave-bar:nth-child(5){animation-delay:0.08s}
  @keyframes waveAnim{0%,100%{height:4px}50%{height:18px}}

  /* PERFIL MODAL */
  #profile-modal {
    display:none;position:absolute;inset:0;z-index:100;
    background:rgba(0,0,0,0.85);backdrop-filter:blur(10px);
    border-radius:24px;
    flex-direction:column;align-items:center;justify-content:center;
    gap:18px;padding:30px;
    animation:fadeIn 0.25s ease;
  }
  #profile-modal.open { display:flex; }
  @keyframes fadeIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
  .modal-title {
    font-family:'Orbitron',monospace;font-size:13px;letter-spacing:3px;
    color:var(--c1);text-shadow:0 0 15px rgba(0,245,255,0.5);
  }

  /* preview avatar usuário */
  #user-preview {
    width:80px;height:80px;border-radius:50%;
    border:2px solid rgba(0,245,255,0.4);
    background:linear-gradient(135deg,var(--c2),var(--c1));
    display:flex;align-items:center;justify-content:center;
    font-family:'Orbitron',monospace;font-size:26px;font-weight:700;
    color:#fff;overflow:hidden;position:relative;cursor:pointer;
    box-shadow:0 0 20px rgba(0,245,255,0.3);
    transition:box-shadow 0.2s;
  }
  #user-preview:hover{box-shadow:0 0 30px rgba(0,245,255,0.6);}
  #user-preview img{width:100%;height:100%;object-fit:cover;}
  #user-img-input{display:none;}
  .preview-hint {
    font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:1px;margin-top:-10px;
  }

  .field-label {
    font-size:11px;letter-spacing:2px;color:rgba(0,245,255,0.6);
    text-transform:uppercase;align-self:flex-start;width:100%;
  }
  .profile-input {
    width:100%;background:rgba(0,245,255,0.05);
    border:1px solid rgba(0,245,255,0.2);
    border-radius:10px;padding:10px 14px;
    color:var(--txt);font-family:'Rajdhani',sans-serif;
    font-size:15px;letter-spacing:0.5px;outline:none;
    transition:border-color 0.2s;
  }
  .profile-input:focus{border-color:rgba(0,245,255,0.5);}
  .color-row {
    display:flex;gap:10px;flex-wrap:wrap;justify-content:center;
  }
  .color-swatch {
    width:32px;height:32px;border-radius:50%;cursor:pointer;
    border:2px solid transparent;transition:transform 0.15s,border-color 0.15s;
  }
  .color-swatch:hover{transform:scale(1.2);}
  .color-swatch.selected{border-color:#fff;transform:scale(1.15);}
  .modal-btns{display:flex;gap:10px;width:100%;}
  .btn-save, .btn-cancel {
    flex:1;padding:10px;border-radius:10px;border:none;
    cursor:pointer;font-family:'Orbitron',monospace;
    font-size:11px;letter-spacing:1px;transition:0.2s;
  }
  .btn-save{
    background:linear-gradient(135deg,var(--c2),var(--c1));color:#fff;
    box-shadow:0 0 15px rgba(0,245,255,0.3);
  }
  .btn-save:hover{box-shadow:0 0 25px rgba(0,245,255,0.6);transform:translateY(-1px);}
  .btn-cancel{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);
  }
  .btn-cancel:hover{background:rgba(255,255,255,0.1);}

  /* MENSAGENS */
  #messages {
    flex:1;overflow-y:auto;padding:16px 14px;
    display:flex;flex-direction:column;gap:11px;
    scroll-behavior:smooth;
  }
  #messages::-webkit-scrollbar{width:3px;}
  #messages::-webkit-scrollbar-track{background:transparent;}
  #messages::-webkit-scrollbar-thumb{background:rgba(0,245,255,0.2);border-radius:2px;}

  .msg-row {
    display:flex;gap:8px;
    animation:msgIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  @keyframes msgIn{from{opacity:0;transform:translateY(12px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}
  .msg-row.user{flex-direction:row-reverse;}

  .msg-mini-av {
    width:32px;height:32px;border-radius:50%;
    flex-shrink:0;margin-top:2px;
    overflow:hidden;
    border:1px solid rgba(0,245,255,0.3);
    display:flex;align-items:center;justify-content:center;
    font-family:'Orbitron',monospace;font-size:11px;font-weight:700;
  }
  .msg-mini-av.ai-mini{
    background:transparent;
    border-color:rgba(0,245,255,0.4);
  }
  .msg-mini-av.ai-mini img{width:100%;height:100%;object-fit:cover;object-position:center top;}
  .msg-mini-av.user-mini{
    background:linear-gradient(135deg,var(--user-color,#7b2fff),rgba(0,245,255,0.5));
  }
  .msg-mini-av.user-mini img{width:100%;height:100%;object-fit:cover;}

  .bubble {
    max-width:75%;padding:10px 14px;border-radius:16px;
    font-size:14px;line-height:1.6;
    font-family:'Rajdhani',sans-serif;font-weight:400;letter-spacing:0.3px;
  }
  .bubble.ai{
    background:linear-gradient(135deg,rgba(0,245,255,0.06),rgba(123,47,255,0.08));
    border:1px solid rgba(0,245,255,0.15);
    border-bottom-left-radius:4px;color:var(--txt);
  }
  .bubble.user{
    background:linear-gradient(135deg,rgba(var(--user-color-rgb,123,47,255),0.5),rgba(0,245,255,0.2));
    border:1px solid rgba(0,245,255,0.2);
    border-bottom-right-radius:4px;color:#fff;
  }
  .msg-time{
    font-size:10px;opacity:0.3;margin-top:3px;
    font-family:'Orbitron',monospace;letter-spacing:1px;
    text-align:right;
  }
  .msg-row.user .msg-time{text-align:left;}

  #typing {
    padding:0 14px 8px;display:none;
    align-items:center;gap:8px;font-size:11px;
    color:var(--c1);opacity:0.7;letter-spacing:1px;
  }
  .typing-dots{display:flex;gap:4px;}
  .typing-dots span{
    width:5px;height:5px;border-radius:50%;background:var(--c1);
    animation:typingBounce 1s ease infinite;
  }
  .typing-dots span:nth-child(2){animation-delay:0.15s;}
  .typing-dots span:nth-child(3){animation-delay:0.3s;}
  @keyframes typingBounce{0%,100%{transform:translateY(0);opacity:0.4}50%{transform:translateY(-5px);opacity:1}}

  /* INPUT */
  #input-area {
    padding:12px 14px;background:rgba(0,0,0,0.3);
    border-top:1px solid rgba(0,245,255,0.08);
    display:flex;gap:8px;align-items:center;flex-shrink:0;
  }

  /* botão perfil usuário */
  #user-btn {
    width:38px;height:38px;border-radius:50%;
    background:linear-gradient(135deg,var(--c2),rgba(0,245,255,0.5));
    border:none;cursor:pointer;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    font-family:'Orbitron',monospace;font-size:13px;font-weight:700;
    color:#fff;flex-shrink:0;
    transition:box-shadow 0.2s;
    box-shadow:0 0 10px rgba(123,47,255,0.4);
  }
  #user-btn:hover{box-shadow:0 0 20px rgba(123,47,255,0.8);}
  #user-btn img{width:100%;height:100%;object-fit:cover;border-radius:50%;}

  #user-in {
    flex:1;background:rgba(0,245,255,0.04);
    border:1px solid rgba(0,245,255,0.15);
    border-radius:20px;padding:10px 16px;
    color:var(--txt);font-family:'Rajdhani',sans-serif;
    font-size:14px;letter-spacing:0.5px;outline:none;
    transition:border-color 0.2s,box-shadow 0.2s;
  }
  #user-in::placeholder{color:rgba(255,255,255,0.2);}
  #user-in:focus{border-color:rgba(0,245,255,0.4);box-shadow:0 0 15px rgba(0,245,255,0.1);}
  #send-btn {
    width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;
    background:linear-gradient(135deg,var(--c2),var(--c1));color:#fff;
    font-size:16px;display:flex;align-items:center;justify-content:center;
    transition:transform 0.2s,box-shadow 0.2s;
    box-shadow:0 0 15px rgba(0,245,255,0.3);flex-shrink:0;
  }
  #send-btn:hover{transform:scale(1.1);box-shadow:0 0 25px rgba(0,245,255,0.6);}
  #send-btn:active{transform:scale(0.95);}
</style>

// ── PERFIL ───────────────────────────────────────────────────────
var SWATCHES = [
  {name:'roxo',  hex:'#7b2fff', rgb:'123,47,255'},
  {name:'ciano', hex:'#00c8ff', rgb:'0,200,255'},
  {name:'rosa',  hex:'#ff2d78', rgb:'255,45,120'},
  {name:'verde', hex:'#00e676', rgb:'0,230,118'},
  {name:'laranja',hex:'#ff6d00',rgb:'255,109,0'},
  {name:'dourado',hex:'#ffd600',rgb:'255,214,0'}
];

var Mem = {
  get: function(k,d){ try{var v=localStorage.getItem('rt3_'+k);return v!==null?JSON.parse(v):d;}catch(e){return d;} },
  set: function(k,v){ try{localStorage.setItem('rt3_'+k,JSON.stringify(v));}catch(e){} }
};

var Profile = {
  name:      Mem.get('name', null),
  colorIdx:  Mem.get('colorIdx', 0),
  imgData:   Mem.get('imgData', null),  // base64 foto usuário

  color: function(){ return SWATCHES[this.colorIdx] || SWATCHES[0]; },

  apply: function() {
    var c = this.color();
    document.documentElement.style.setProperty('--user-color', c.hex);
    document.documentElement.style.setProperty('--user-color-rgb', c.rgb);
    // botão perfil
    var btn = document.getElementById('user-btn');
    var letter = document.getElementById('user-btn-letter');
    if (this.imgData) {
      btn.innerHTML = '<img src="'+this.imgData+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">';
    } else {
      btn.innerHTML = '<span id="user-btn-letter">' + (this.name ? this.name[0].toUpperCase() : '?') + '</span>';
      btn.style.background = 'linear-gradient(135deg,'+c.hex+',rgba(0,245,255,0.5))';
    }
  }
};

// ── MODAL ────────────────────────────────────────────────────────
var tempImgData = null;
var tempColorIdx = Profile.colorIdx;

function buildSwatches() {
  var row = document.getElementById('color-row');
  row.innerHTML = '';
  SWATCHES.forEach(function(s, i) {
    var sw = document.createElement('div');
    sw.className = 'color-swatch' + (i === Profile.colorIdx ? ' selected' : '');
    sw.style.background = s.hex;
    sw.style.boxShadow = '0 0 8px ' + s.hex;

// ── MOTOR DE MATEMÁTICA ──────────────────────────────────────────
var MathEngine = {

  // Converte palavras para operadores/números
  normalize: function(txt) {
    return txt
      .replace(/\bvezes\b/g, '*')
      .replace(/\bmultiplicado por\b/g, '*')
      .replace(/\bmultiplicar\b/g, '*')
      .replace(/\bdividido por\b/g, '/')
      .replace(/\bdividir por\b/g, '/')
      .replace(/\bdivide\b/g, '/')
      .replace(/\bsobre\b/g, '/')
      .replace(/\bmais\b/g, '+')
      .replace(/\bsomar\b/g, '+')
      .replace(/\bsoma\b/g, '+')
      .replace(/\bmenos\b/g, '-')
      .replace(/\bsubtrai\b/g, '-')
      .replace(/\bsubtração\b/g, '-')
      .replace(/\bsubtrair\b/g, '-')
      .replace(/\be meio\b/g, '.5')
      .replace(/\be um quarto\b/g, '.25')
      .replace(/\bponto\b/g, '.')
      .replace(/,/g, '.');
  },

  // Avalia expressão com segurança
  evalExpr: function(expr) {
    expr = expr.replace(/[^0-9+\-*\/().% ]/g, '').trim();
    if (!expr || expr.length < 1) return null;
    try {
      var res = Function('"use strict"; return (' + expr + ')')();
      if (typeof res === 'number' && isFinite(res)) return res;
    } catch(e) {}
    return null;
  },

  // Formata resultado (remove decimais desnecessários)
  fmt: function(n) {
    if (n === Math.floor(n)) return String(n);
    return parseFloat(n.toFixed(6)).toString();
  },

  solve: function(raw) {
    var t = raw.toLowerCase()
      .replace(/[áàãâ]/g,'a').replace(/[éèê]/g,'e')
      .replace(/[íì]/g,'i').replace(/[óòõô]/g,'o')
      .replace(/[úù]/g,'u').replace(/ç/g,'c');

    // ── RAIZ QUADRADA ────────────────────────────────────────────
    var m = t.match(/raiz\s*(?:quadrada)?\s*(?:de\s*)?([\d.,]+)/);
    if (m) {
      var n = parseFloat(m[1].replace(',','.'));
      if (!isNaN(n) && n >= 0) {
        var r = Math.sqrt(n);
        return '√' + n + ' = ' + this.fmt(r);
      }
    }

    // ── POTÊNCIA / ELEVADO ───────────────────────────────────────
    m = t.match(/([\d.,]+)\s*(?:elevado\s*a|elevado\s*ao|ao\s*quadrado|ao\s*cubo|\^)\s*([\d.,]*)/);
    if (m) {
      var base = parseFloat(m[1].replace(',','.'));
      var exp  = 2;
      if (t.indexOf('ao cubo') !== -1) exp = 3;
      else if (m[2]) exp = parseFloat(m[2].replace(',','.')) || 2;
      if (!isNaN(base) && !isNaN(exp)) {
        var r = Math.pow(base, exp);
        return base + (exp===2?' ao quadrado':exp===3?' ao cubo':'^'+exp) + ' = ' + this.fmt(r);
      }
    }

    // ── PORCENTAGEM: X% de Y ─────────────────────────────────────
    m = t.match(/([\d.,]+)\s*(?:%|por\s*cento)\s*(?:de|do|da)\s*([\d.,]+)/);
    if (m) {
      var pct = parseFloat(m[1].replace(',','.'));
      var tot = parseFloat(m[2].replace(',','.'));
      if (!isNaN(pct) && !isNaN(tot)) {
        var r = (pct / 100) * tot;
        return pct + '% de ' + tot + ' = ' + this.fmt(r);
      }
    }

    // ── PORCENTAGEM: quanto é X% ? ───────────────────────────────
    m = t.match(/([\d.,]+)\s*(?:%|por\s*cento)/);
    if (m && t.match(/de|do|da/)) {
      // já tratado acima
    }

    // ── FATORIAL ─────────────────────────────────────────────────
    m = t.match(/fatorial\s*(?:de\s*)?([\d]+)/);
    if (!m) m = t.match(/([\d]+)\s*!/);
    if (m) {
      var n = parseInt(m[1]);
      if (n >= 0 && n <= 20) {
        var r = 1;
        for (var i = 2; i <= n; i++) r *= i;
        return n + '! = ' + r;
      }
      if (n > 20) return 'Fatorial de ' + n + ' é enorme demais pra mostrar aqui! 😅';
    }

    // ── LOGARITMO ────────────────────────────────────────────────
    m = t.match(/log(?:aritmo)?\s*(?:de\s*)?([\d.,]+)/);
    if (m) {
      var n = parseFloat(m[1].replace(',','.'));
      if (!isNaN(n) && n > 0) return 'log(' + n + ') = ' + this.fmt(Math.log10(n));
    }
    m = t.match(/ln\s*(?:de\s*)?([\d.,]+)/);
    if (m) {
      var n = parseFloat(m[1].replace(',','.'));
      if (!isNaN(n) && n > 0) return 'ln(' + n + ') = ' + this.fmt(Math.log(n));
    }

    // ── TABUADA ──────────────────────────────────────────────────
    m = t.match(/tabuada\s*(?:do|de|da)?\s*([\d]+)/);
    if (m) {
      var n = parseInt(m[1]);
      if (!isNaN(n)) {
        var lines = [];
        for (var i = 1; i <= 10; i++) lines.push(n + ' x ' + i + ' = ' + (n*i));
        return 'Tabuada do ' + n + ':\n' + lines.join('\n');
      }
    }

    // ── EXPRESSÃO NUMÉRICA DIRETA (ex: 5+3, 10*2, etc.) ─────────
    // Primeiro normaliza linguagem natural
    var norm = this.normalize(t);
    // Extrai a expressão numérica
    var exprMatch = norm.match(/([\d.,]+\s*[\+\-\*\/]\s*[\d.,]+(?:\s*[\+\-\*\/]\s*[\d.,]+)*)/);
    if (exprMatch) {
      var expr = exprMatch[1].replace(/,/g,'.');
      var res = this.evalExpr(expr);
      if (res !== null) {
        // monta resposta legível
        var opWord = '';
        var parts = expr.match(/([\d.]+)\s*([\+\-\*\/])\s*([\d.]+)/);
        if (parts) {
          var a = parseFloat(parts[1]);
          var op = parts[2];
          var b = parseFloat(parts[3]);
          var opName = {'+':'mais','-':'menos','*':'vezes','/':'dividido por'}[op]||op;
          return this.fmt(a) + ' ' + opName + ' ' + this.fmt(b) + ' = **' + this.fmt(res) + '**';
        }
        return expr + ' = ' + this.fmt(res);
      }
    }

    // ── EXPRESSÃO COM PALAVRAS NUMÉRICAS (ex: "quanto é 2 mais 3") 
    var norm2 = this.normalize(t);
    var stripped = norm2.replace(/[^0-9+\-*\/.() ]/g,' ').trim();
    var tokens = stripped.split(/\s+/).filter(function(x){ return x !== ''; });
    if (tokens.length >= 3) {
      var expr2 = tokens.join('');
      var res2 = this.evalExpr(expr2);
      if (res2 !== null) {
        return 'Resultado: **' + this.fmt(res2) + '**';
      }
    }

    return null;
  }
};

// ── DICIONÁRIO ABERTO API ────────────────────────────────────────
var Dicio = {

  // Extrai texto limpo do XML retornado pela API
  parseXml: function(xml) {
    if (!xml) return null;
    // remove tags XML, mantém texto
    var txt = xml
      .replace(/<def>/g,'').replace(/<\/def>/g,'')
      .replace(/<gramGrp>[^<]*<\/gramGrp>/g,'')
      .replace(/<usg[^>]*>[^<]*<\/usg>/g,'')
      .replace(/<etym[^>]*>[\s\S]*?<\/etym>/g,'')
      .replace(/<[^>]+>/g,' ')
      .replace(/\[\[([^\]]+)\]\]/g,'$1')  // links internos
      .replace(/_([^_]+)_/g,'$1')         // itálico markdown
      .replace(/\s{2,}/g,' ')
      .trim();
    // pega só a primeira definição significativa
    var lines = txt.split('\n').map(function(l){ return l.trim(); }).filter(function(l){ return l.length > 5; });
    return lines[0] || txt.substring(0, 200);
  },

  // Extrai palavra-chave da pergunta do usuário
  extractWord: function(raw) {
    var t = raw.toLowerCase()
      .replace(/[áàãâä]/g,'a').replace(/[éèêë]/g,'e')
      .replace(/[íìîï]/g,'i').replace(/[óòõôö]/g,'o')
      .replace(/[úùûü]/g,'u').replace(/ç/g,'c');

    // padrões de pergunta: "o que é X", "o que significa X", "me fala sobre X"
    var patterns = [
      /o que (?:é|e|significa|quer dizer)\s+(?:a|o|um|uma|o termo|a palavra)?\s*(.+)/,
      /(?:defin(?:e|a|ição de)|significado de|conceito de|o que (?:é|e) um?a?)\s+(.+)/,
      /(?:me (?:fala|conta|explica|diz) (?:sobre|o que é)?)\s+(.+)/,
      /(?:qual (?:é|o significado de|a definição de))\s+(.+)/,
      /^(?:defin[ei]|explica|conceitua)\s+(.+)/
    ];

    for (var i = 0; i < patterns.length; i++) {
      var m = t.match(patterns[i]);
      if (m) {
        // pega primeira palavra relevante (sem artigos/prep)
        var word = m[1].trim()
          .replace(/^(a|o|um|uma|os|as|uns|umas|de|do|da)\s+/,'')
          .split(/\s+/)[0]
          .replace(/[?!.,;]/g,'');
        if (word.length > 2) return word;
      }
    }

    // Se nenhum padrão encaixou, tenta pegar a palavra mais longa da frase
    // (provavelmente o substantivo)
    var stopwords = ['que','como','qual','quando','onde','porque','pois','mas','para','com','sem','por','sobre','voce','isso','este','essa','esse','nao','sim','tem','ter','ser','foi','sao'];
    var words = t.replace(/[?!.,;]/g,'').split(/\s+/).filter(function(w){
      return w.length > 3 && stopwords.indexOf(w) === -1;
    });
    if (words.length > 0) {
      // ordena por tamanho (maior = mais específico)
      words.sort(function(a,b){ return b.length - a.length; });
      return words[0];
    }
    return null;
  },

  // Busca na API
  search: function(word, callback) {
    var url = 'https://api.dicionario-aberto.net/word/' + encodeURIComponent(word);
    fetch(url)
      .then(function(r){ return r.json(); })
      .then(function(data) {
        if (!data || data.length === 0) { callback(null, word); return; }
        var entry = data[0];
        var def = Dicio.parseXml(entry.xml);
        callback(def, entry.word || word);
      })
      .catch(function(){ callback(null, word); });
  },

  // Monta resposta amigável
  format: function(def, word, originalQuery) {
    if (!def) {
      return 'Procurei "' + word + '" no dicionário mas não encontrei nada. Tenta reformular! 📖';
    }
    var prefixes = [
      '📖 Achei no dicionário: **' + word + '** → ' + def,
      '📚 Segundo o dicionário, **' + word + '** significa: ' + def,
      '🔍 Consultei o dicionário sobre **' + word + '**: ' + def
    ];
    return prefixes[Math.floor(Math.random() * prefixes.length)];
  }
};

  ask: function(userMsg, callback) {
    if (!this.key) { callback(null, 'sem_chave'); return; }

    // mantém histórico curto (últimas 6 trocas)
    this.history.push({ role: 'user', content: userMsg });
    if (this.history.length > 12) this.history = this.history.slice(-12);

    fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': this.key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 300,
        system: this.systemPrompt(),
        messages: this.history
      })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) { callback(null, 'erro'); return; }
      var reply = data.content && data.content[0] && data.content[0].text;
      if (reply) {
        AI.history.push({ role: 'assistant', content: reply });
        callback(reply, 'ok');
      } else {
        callback(null, 'erro');
      }
    })
    .catch(function() { callback(null, 'erro'); });
  }
};

// ── HANDLE ASSÍNCRONO ────────────────────────────────────────────
function handle() {
  var val = input.value.trim();
  if (!val) return;
  addMsg('user', val);
  input.value = '';
  typing.style.display = 'flex';

  setTimeout(function() {
    var res = Bot.reply(val);

    // ── resposta local (hora, nome, piada, cor, etc.) ──
    if (res !== '__DICIO__') {
      typing.style.display = 'none';
      addMsg('ai', res);
      Bot.speak(res);
      return;
    }

    // ── IA real ativada → usa Claude API ──
    if (AI.key) {
      var done = false;
      var timeout = setTimeout(function() {
        if (done) return; done = true;
        typing.style.display = 'none';
        var msg = 'Demorei demais pra pensar. Tenta de novo! 😅';
        addMsg('ai', msg); Bot.speak(msg);
      }, 15000);

      AI.ask(val, function(reply, status) {
        if (done) return; done = true;
        clearTimeout(timeout);
        typing.style.display = 'none';
        var msg;
        if (status === 'ok' && reply) {
          msg = reply;
        } else if (status === 'erro') {
          msg = 'Tive um problema ao consultar a IA. Verifica sua API key! 🔑';
        } else {
          msg = 'Algo deu errado. Tenta de novo!';
        }
        addMsg('ai', msg);
        Bot.speak(msg);
      });
      return;
    }

    // ── sem IA → tenta dicionário ──
    var word = Dicio.extractWord(val);
    if (!word) {
      typing.style.display = 'none';
      var fallbacks = [
        'Hmm, não sei isso ainda' + (Bot.name ? ', ' + Bot.name : '') + '. Ativa a IA clicando em 🔑 para eu responder qualquer coisa!',
        'Não captei. Tenta reformular ou ativa a IA com 🔑!',
        'Isso tá fora do meu alcance. Que tal ativar a IA real? Clica em 🔑!'
      ];
      var fb = fallbacks[Math.floor(Math.random() * fallbacks.length)];
      addMsg('ai', fb); Bot.speak(fb);
      return;
    }

    var done2 = false;
    var timeout2 = setTimeout(function() {
      if (done2) return; done2 = true;
      typing.style.display = 'none';
      var msg = 'Demorei pra buscar no dicionário. Tenta de novo! 📖';
      addMsg('ai', msg); Bot.speak(msg);
    }, 5000);

    Dicio.search(word, function(def, foundWord) {
      if (done2) return; done2 = true;
      clearTimeout(timeout2);
      typing.style.display = 'none';
      var msg = Dicio.format(def, foundWord, val);
      addMsg('ai', msg);
      Bot.speak(msg);
    });

  }, 400 + Math.random() * 300);
}

btn.onclick = handle;
input.onkeypress = function(e){ if(e.key==='Enter') handle(); };
